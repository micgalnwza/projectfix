<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>รายการจอง</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

body{
background:#f4f6fb;
}

.layout{
display:flex;
}

/* sidebar */

.sidebar{
width:220px;
background:#fff;
height:100vh;
padding:20px;
border-right:1px solid #eee;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:12px;
margin-bottom:8px;
text-decoration:none;
color:#333;
border-radius:8px;
}

.sidebar a.active{
background:#e7efff;
color:#2c5cff;
}

/* main */

.main{
flex:1;
padding:30px;
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header-right{
display:flex;
align-items:center;
gap:15px;
}

.bell{
font-size:20px;
cursor:pointer;
}

.home-btn{
background:#2c5cff;
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

/* card */

.card{
background:white;
border-radius:14px;
padding:25px;
}

/* stats */

.stats{
display:flex;
gap:20px;
margin-bottom:25px;
}

.stat-box{
flex:1;
background:#f8f9fc;
padding:20px;
border-radius:12px;
}

.stat-box h4{
font-size:14px;
color:#777;
margin-bottom:5px;
}

.stat-box h2{
font-size:24px;
}

/* table */

table{
width:100%;
border-collapse:collapse;
}

th{
background:#f2f4f8;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

/* buttons */

.btn-confirm{
background:#2ecc71;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.btn-cancel{
background:#e74c3c;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="layout">

<!-- sidebar -->

<div class="sidebar">

<h2>FM Barber</h2>

<a href="admin.html">การจอง</a>
<a href="manage.html">จัดการตารางงาน</a>
<a class="active">รายการจอง</a>

</div>

<!-- main -->

<div class="main">

<div class="header">

<h3>รายการจองทั้งหมด</h3>

<div class="header-right">


<a href="notificationadmin.html">

<span class="bell">🔔</span></a>

<button class="home-btn" onclick="location.href='index.html'">
กลับสู่หน้าหลัก
</button>

</div>

</div>

<div class="card">

<div class="stats">

<div class="stat-box">
<h4>จำนวนการจองวันนี้</h4>
<h2 id="todayCount">0</h2>
</div>

<div class="stat-box">
<h4>รอดำเนินการ</h4>
<h2 id="pendingCount">0</h2>
</div>

<div class="stat-box">
<h4>เสร็จสิ้น</h4>
<h2 id="doneCount">0</h2>
</div>

</div>

<table>

<thead>
<tr>
<th>ชื่อ</th>
<th>เวลา</th>
<th>สถานะ</th>
<th>จัดการ</th>
</tr>
</thead>

<tbody id="bookingTable"></tbody>

</table>

</div>

</div>

</div>

<script>

let bookings =
JSON.parse(localStorage.getItem("bookings")) || []

function render(){

let bookings =
JSON.parse(localStorage.getItem("bookings")) || []

const table=document.getElementById("bookingTable")

table.innerHTML=""

let today=0
let pending=0
let done=0

bookings.forEach((b,i)=>{

if(b.status==="รอ") pending++
if(b.status==="เสร็จ") done++

today++

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${b.name}</td>
<td>${b.date} ${b.time}</td>
<td>${b.status}</td>

<td>

<button class="btn-confirm" onclick="finish(${i})">
เสร็จ
</button>

<button class="btn-cancel" onclick="cancel(${i})">
ยกเลิก
</button>

</td>
`

table.appendChild(tr)

})

document.getElementById("todayCount").innerText=today
document.getElementById("pendingCount").innerText=pending
document.getElementById("doneCount").innerText=done

}

function cancel(i){

if(confirm("ยกเลิกคิวนี้?")){

let bookings =
JSON.parse(localStorage.getItem("bookings")) || []

let booking = bookings[i]

/* แจ้งเตือนลูกค้า */

let notifications =
JSON.parse(localStorage.getItem("notifications")) || []

notifications.unshift({
message:"คิวของคุณวันที่ "+booking.date+" เวลา "+booking.time+" ถูกยกเลิกโดยร้าน",
timestamp:new Date().toLocaleString("th-TH")
})

localStorage.setItem(
"notifications",
JSON.stringify(notifications)
)

/* ลบ booking */

bookings.splice(i,1)

localStorage.setItem(
"bookings",
JSON.stringify(bookings)
)

/* ลบเฉพาะคิวเดียวกัน */

let finalBooking =
JSON.parse(localStorage.getItem("finalBooking"))

if(finalBooking && finalBooking.queue === booking.queue){
localStorage.removeItem("finalBooking")
}

render()

}

}
function finish(i){

let bookings =
JSON.parse(localStorage.getItem("bookings")) || []

bookings[i].status="เสร็จ"

localStorage.setItem(
"bookings",
JSON.stringify(bookings)
)

render()

}
render();

</script>

</body>
</html>
