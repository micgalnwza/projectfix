<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ยืนยันข้อมูลการจอง</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<header>
<div class="logo">
<h2>FM<br>Barber</h2>
</div>

<nav class="center-menu">
<a href="index.html">หน้าหลัก</a>
<a href="portfolio.html">ผลงาน</a>
</nav>

<div class="right-menu">
<a href="notification.html" class="notification active">
<i class="fa-solid fa-bell"></i>
</a>
<button class="login-btn" onclick="window.location.href='admin.html'">
เข้าสู่ระบบหลังร้าน
</button>
</div>
</header>

<div class="confirm-container">
    <h2>ยืนยันข้อมูลการจอง</h2>

    <div class="info" id="infoContainer">
        <p>ชื่อผู้ใช้บริการ:</p>
        <input type="text" id="name" placeholder="กรอกชื่อผู้ใช้บริการ">

        <p>เบอร์โทร:</p>
        <input type="text" id="phone" placeholder="กรอกเบอร์โทร 10 หลัก">

        <p>อีเมล:</p>
        <input type="email" id="email" placeholder="example@email.com">

        <p>วันที่ที่ต้องการใช้บริการ:</p>
        <span id="showDate" style="font-weight: bold;"></span>

        <p>เวลาที่ต้องการใช้บริการ:</p>
        <span id="showTime" style="font-weight: bold;"></span>

        <p id="showNote" style="margin-top: 10px; color: #555;"></p>

        <div id="depositBox" style="background: #fdf2f2; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px dashed #e74c3c;">
            <p>✂️ ทรงผมที่เลือก: <strong id="showStyle"></strong></p>
            <p style="color:red;">💰 ยอดมัดจำที่ต้องโอน: <strong id="showDeposit"></strong> บาท</p>
            <hr style="border: 0.5px solid #eee; margin: 10px 0;">
            <p style="font-size: 0.8em; text-align: center;">สแกนเพื่อจ่ายมัดจำ (จำลอง)</p>
            <img id="qrCode" src="" style="display:block; margin:auto; width:120px;">
            <p style="font-size: 11px; margin-top: 10px;">แนบสลิปโอนเงิน:</p>
            <input type="file" id="slip" style="font-size: 12px; width: 100%;">
        </div>
    </div>

    <div class="btn-group">
        <button type="button" onclick="window.location.href='booking.html'">แก้ไขการจอง</button>
        <button type="button" onclick="saveBooking()" style="background: #2ecc71; color: white;">ยืนยันการจอง</button>
    </div>

    <button type="button" class="cancel" onclick="openCancelPopup()">ยกเลิกการจอง</button>
</div>

<div id="cancelPopup" class="popup">
    <div class="popup-box">
        <h3>คุณต้องการยกเลิกการจองหรือไม่ ?</h3>
        <div class="popup-btn">
            <button onclick="closeCancelPopup()" class="no">ไม่</button>
            <button onclick="confirmCancel()" class="yes">ใช่</button>
        </div>
    </div>
</div>

<div id="cancelSuccess" class="popup">
    <div class="popup-box">
        <h3>ยกเลิกการจองสำเร็จ</h3>
        <button onclick="goHome()" class="ok">ตกลง</button>
    </div>
</div>

<script>
// --- โหลดข้อมูลจาก localStorage มาแสดง ---
const date = localStorage.getItem("selectedDate");
const time = localStorage.getItem("selectedTime");
const note = localStorage.getItem("bookingNote");
const style = localStorage.getItem("selectedStyle") || "ยังไม่ได้เลือก";
const deposit = localStorage.getItem("depositAmount") || "0";

document.getElementById("showDate").innerText = date || "-";
document.getElementById("showTime").innerText = time || "-";
document.getElementById("showNote").innerText = "หมายเหตุ: " + (note || "-");
document.getElementById("showStyle").innerText = style;
document.getElementById("showDeposit").innerText = deposit;

// สร้าง QR Code ตามยอดเงินมัดจำ
document.getElementById("qrCode").src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=BarberPay_Amount_${deposit}`;

function saveBooking(){
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim();
    const slipFile = document.getElementById("slip").value;

    if(name === ""){ alert("กรุณากรอกชื่อผู้ใช้บริการ"); return; }
    if(phone === "" || phone.length !== 10){ alert("กรุณากรอกเบอร์โทร 10 หลัก"); return; }
    if(slipFile === ""){ alert("กรุณาแนบสลิปมัดจำเพื่อยืนยันคิว"); return; }

    const queueNumber = Math.floor(Math.random()*1000).toString().padStart(3,"0");

    /* 1. บันทึกข้อมูลลงฐานข้อมูลรวม (แอดมินจะเห็นข้อมูลทรงผมและมัดจำด้วย) */
    let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
    bookings.push({
        name: name,
        phone: phone,
        email: email,
        date: date,
        time: time,
        style: style,     // เพิ่มข้อมูลทรงผม
        deposit: deposit, // เพิ่มข้อมูลมัดจำ
        note: note || "-",
        queue: queueNumber,
        status: "รอ"
    });
    localStorage.setItem("bookings", JSON.stringify(bookings));

    /* 2. แจ้งเตือนลูกค้า */
    let notifications = JSON.parse(localStorage.getItem("notifications")) || [];
    notifications.unshift({
        type: "confirm",
        message: `จองคิวสำเร็จ (#${queueNumber}) ทรง: ${style}`,
        timestamp: new Date().toLocaleString("th-TH")
    });
    localStorage.setItem("notifications", JSON.stringify(notifications));

    /* 3. แจ้งเตือนแอดมิน */
    let adminNotifications = JSON.parse(localStorage.getItem("adminNotifications")) || [];
    adminNotifications.unshift({
        message: `จองใหม่: ${name} (ทรง: ${style} | มัดจำ: ${deposit}.-)`,
        timestamp: new Date().toLocaleString("th-TH")
    });
    localStorage.setItem("adminNotifications", JSON.stringify(adminNotifications));

    /* 4. บันทึกสถานะการจองล่าสุดสำหรับหน้า Index */
    localStorage.setItem("finalBooking", JSON.stringify({
        name: name,
        date: date,
        time: time,
        style: style,
        deposit: deposit,
        queue: queueNumber
    }));

    alert("จองสำเร็จ! คิวของคุณคือ #" + queueNumber);
    window.location.href = "index.html";
}

function openCancelPopup(){ document.getElementById("cancelPopup").style.display="flex"; }
function closeCancelPopup(){ document.getElementById("cancelPopup").style.display="none"; }

function confirmCancel(){
    let notifications = JSON.parse(localStorage.getItem("notifications")) || [];
    notifications.unshift({
        type: "cancel",
        message: "ยกเลิกการจองสำเร็จ",
        timestamp: new Date().toLocaleString("th-TH")
    });
    localStorage.setItem("notifications", JSON.stringify(notifications));
    document.getElementById("cancelPopup").style.display="none";
    document.getElementById("cancelSuccess").style.display="flex";
}

function goHome(){ window.location.href="index.html"; }
</script>

</body>
</html>
