<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | FM Barber</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #10b981;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Kanit', sans-serif;
            
            /* --- ส่วนของการใส่รูปพื้นหลัง --- */
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                              url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=2070'); /* ใส่ที่อยู่รูปภาพของคุณที่นี่ */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow: hidden;
        }

        .login-card {
            /* กระจกฝ้าแบบเนียนๆ สู้กับรูปพื้นหลัง */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            color: white;
        }

        .logo h2 { font-size: 32px; margin-bottom: 20px; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        .role-selector {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .role-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            color: #ccc;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            border-radius: 9px;
            transition: 0.3s;
        }

        .role-btn.active {
            background: var(--primary);
            color: white;
        }

        .input-box {
            position: relative;
            margin-bottom: 15px;
        }

        .input-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #ddd;
        }

        .input-box input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px 15px 14px 45px;
            border-radius: 12px;
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        .input-box input::placeholder { color: #ccc; }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .login-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .desc-text { color: #ddd; font-size: 13px; margin-bottom: 15px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #ccc;
            text-decoration: none;
            font-size: 13px;
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">
            <h2>FM BARBER</h2>
        </div>

        <div class="role-selector">
            <button class="role-btn active" onclick="setRole('customer', this)">ลูกค้า</button>
            <button class="role-btn" onclick="setRole('admin', this)">เจ้าของร้าน</button>
        </div>

        <p class="desc-text" id="roleDesc">เข้าสู่ระบบเพื่อตรวจสอบสถานะคิวของคุณ</p>

        <form id="loginForm">
            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="user" placeholder="ชื่อผู้ใช้งาน / เบอร์โทร" required>
            </div>
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="pass" placeholder="รหัสผ่าน" required>
            </div>
            <button type="submit" class="login-btn" id="mainBtn">เข้าสู่ระบบ</button>
        </form>

        <a href="index.html" class="back-link">กลับสู่หน้าหลัก</a>
    </div>

    <script>
        let currentRole = 'customer';

        function setRole(role, btn) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const desc = document.getElementById('roleDesc');
            const btnEl = document.getElementById('mainBtn');
            if(role === 'admin') {
                desc.innerText = "ระบบจัดการหลังร้าน (สำหรับช่าง)";
                btnEl.style.background = '#3b82f6';
            } else {
                desc.innerText = "เข้าสู่ระบบเพื่อตรวจสอบสถานะคิวของคุณ";
                btnEl.style.background = '#10b981';
            }
        }

        document.getElementById("loginForm").onsubmit = function(e) {
            e.preventDefault();
            const username = document.getElementById("user").value;
            if (currentRole === 'admin') {
                localStorage.setItem("currentUser", JSON.stringify({ role: 'admin', name: username }));
                window.location.href = "admin.html";
            } else {
                localStorage.setItem("currentUser", JSON.stringify({ role: 'customer', name: username }));
                window.location.href = "index.html"; 
            }
        };
    </script>
</body>
</html>
