<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>การแจ้งเตือน - FM Barber</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
    <div class="logo">
        <h2>FM<br>Barber</h2>
    </div>

    <nav>
        <a href="index.html">หน้าหลัก</a>
        <a href="portfolio.html">ผลงาน</a>
    </nav>

    <div class="right-menu">
        <a href="notification.html" class="notification active">
            <i class="fa-solid fa-bell"></i>
        </a>
        <button class="login-btn" onclick="window.location.href='admin.html'">
            เข้าสู่ระบบหลังร้าน
</button>
    </div>
</header>

<hr>

<section class="notification-section">

<h2>การแจ้งเตือน</h2>

<div id="notificationContainer"></div>

</section>

<script>

const container = document.getElementById("notificationContainer");

function getNotifications(){
    return JSON.parse(localStorage.getItem("notifications")) || [];
}

function renderNotifications(){

    const notifications = getNotifications();

    container.innerHTML = "";

    if(notifications.length === 0){
        container.innerHTML = "<p style='color:white;'>ไม่มีการแจ้งเตือน</p>";
        return;
    }

    notifications.forEach((noti,index)=>{

        container.innerHTML += `

        <div class="noti-card">
            <div class="noti-text">
                <h4>
                    ${noti.message}
                    <i class="fa-solid fa-circle-check success"></i>
                </h4>
                <p>${noti.timestamp}</p>
            </div>

            <div class="noti-delete">
                <i class="fa-solid fa-trash" onclick="deleteNotification(${index})"></i>
            </div>
        </div>

        `;
    });

}

function deleteNotification(index){

    let notifications = getNotifications();

    notifications.splice(index,1);

    localStorage.setItem("notifications",JSON.stringify(notifications));

    renderNotifications();
}

renderNotifications();

</script>

</body>
</html>
